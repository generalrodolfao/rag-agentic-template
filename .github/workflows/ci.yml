name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: python3.12 -m venv .venv && source .venv/bin/activate && pip install -q ruff && ruff check src/ examples/

  typecheck:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: python3.12 -m venv .venv && source .venv/bin/activate && pip install -q mypy . && mypy src/ --ignore-missing-imports
        continue-on-error: true

  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: python3.12 -m venv .venv && source .venv/bin/activate && pip install -q -r requirements.txt && pip install -q pytest pytest-cov && pytest tests/ -v --cov=src --cov-report=term-missing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test' }}
